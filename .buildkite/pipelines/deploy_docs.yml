agents:
  provider: gcp
  image: "family/eui-ubuntu-2204"
  # 4 AMD Rome / Milan vCPUs, 16GB RAM
  machineType: 'n2d-standard-4'
  # No spot instances to protect against agent losses during file upload
  preemptible: false

steps:
  - label: ":gear: Setup"
    key: "setup"
    command: .buildkite/scripts/deploy_docs/step_setup.sh

  - label: ":docusaurus: Build and deploy website"
    key: "build-website"
    depends_on: "setup"
    command: .buildkite/scripts/deploy_docs/step_build_website.sh

  - label: ":book: Build and deploy Storybook"
    key: "build-storybook"
    depends_on: "setup"
    command: .buildkite/scripts/deploy_docs/step_build_storybook.sh

  - label: ":camera: Test visual regression"
    key: "vrt"
    depends_on: "build-storybook"
    if: build.pull_request.id != null
    timeout_in_minutes: 30
    command: .buildkite/scripts/deploy_docs/step_vrt.sh
    artifact_paths:
      - "packages/eui/.vrt/diff/**/*.png"
      - "packages/eui/.vrt/current/**/*-received.png"

  # The "Approve visual changes" block step and "Update VRT baselines" step are
  # uploaded dynamically by step_vrt.sh only when visual differences are found.
  # Buildkite's `if:` expressions can't read runtime meta-data, so this step is
  # the only one that can't be expressed declaratively here.

  - label: ":loudspeaker: Notify"
    key: "notify"
    depends_on:
      - step: "build-website"
        allow_failure: true
      - step: "build-storybook"
        allow_failure: true
      - step: "vrt"
        allow_failure: true
    allow_dependency_failure: true
    command: .buildkite/scripts/deploy_docs/step_notify.sh
